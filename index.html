<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Calendar</title>
<style>
:root{
  --bg:#f7f7f5;--surface:#fff;--border:#e4e4e0;--bstrong:#c8c8c2;
  --text:#1a1a18;--t2:#5a5a54;--t3:#9a9a92;
  --accent:#2563eb;--abg:#eff6ff;--atx:#1d4ed8;
  --gbg:#f0fdf4;--gtx:#15803d;
  --ybg:#fffbeb;--ytx:#92400e;
  --rbg:#fef2f2;--rtx:#991b1b;
  --gray:#f4f4f2;
  --r:8px;--rl:12px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','Fira Mono',monospace;
  --sw:252px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.shell{display:grid;grid-template-columns:var(--sw) 1fr;grid-template-rows:auto 1fr;min-height:100vh}

/* topbar */
.tb{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:600;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.tb-sp{flex:1}
.tb-act{display:flex;gap:7px;align-items:center}

/* sidebar */
.sb{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding-bottom:24px}
.sbs{padding:14px 14px 0}
.sbs+.sbs{padding-top:10px}
.slbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.scard{background:var(--gray);border-radius:var(--r);padding:9px 11px}
.sval{font-size:19px;font-weight:600;line-height:1;color:var(--text)}
.slb{font-size:10px;color:var(--t3);margin-top:2px}
.scard.danger .sval{color:#dc2626}
.site-list{display:flex;flex-direction:column;gap:2px}
.site-row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:var(--r);cursor:pointer;user-select:none;border:1px solid transparent;transition:background .1s}
.site-row:hover{background:var(--gray)}
.site-row.active{background:var(--abg);border-color:#bfdbfe}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.sname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.snext{font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.scnt{font-size:10px;color:var(--t3);flex-shrink:0}
.add-site-btn{margin:7px 14px 0;padding:7px 0;border:1px dashed var(--bstrong);border-radius:var(--r);background:none;cursor:pointer;font-size:12px;color:var(--t3);width:calc(100% - 28px);display:flex;align-items:center;justify-content:center;gap:5px;transition:background .1s,color .1s;font-family:var(--font)}
.add-site-btn:hover{background:var(--gray);color:var(--t2)}
.tlist{display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:7px}
.tname{font-size:11px;color:var(--t2);min-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ttime{font-size:10px;color:var(--t3);min-width:36px}
.tbar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.tfill{height:100%;border-radius:2px}
.warn-pill{display:flex;align-items:center;gap:6px;font-size:11px;padding:6px 9px;background:var(--ybg);color:var(--ytx);border-radius:var(--r);margin-top:6px}
.setup-banner{background:var(--ybg);border:1px solid #fde68a;border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ytx);margin:10px 14px 0}

/* main */
.main{display:flex;flex-direction:column;overflow:hidden}
.main-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.mnav{display:flex;align-items:center;gap:5px}
.mnav button{padding:4px 8px;border:1px solid var(--border);border-radius:var(--r);background:none;cursor:pointer;color:var(--t2);font-size:14px;line-height:1}
.mnav button:hover{background:var(--gray)}
.mlbl{font-size:14px;font-weight:600;min-width:136px;text-align:center}
.vtabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.vtab{padding:5px 13px;font-size:12px;cursor:pointer;background:none;border:none;color:var(--t3);font-family:var(--font)}
.vtab:not(:last-child){border-right:1px solid var(--border)}
.vtab.on{background:var(--text);color:#fff;font-weight:500}
.mla{margin-left:auto;display:flex;gap:7px}

/* buttons */
.btn{padding:6px 13px;border-radius:var(--r);font-size:12px;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500;transition:background .1s,opacity .1s;line-height:1.4}
.btn-p{background:var(--accent);color:#fff;border:none}
.btn-p:hover{background:#1d4ed8}
.btn-g{background:none;border:1px solid var(--bstrong);color:var(--t2)}
.btn-g:hover{background:var(--gray)}
.btn-d{background:none;border:1px solid #fca5a5;color:#dc2626}
.btn-d:hover{background:var(--rbg)}
.btn-gn{background:#16a34a;color:#fff;border:none}
.btn-gn:hover{background:#15803d}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* calendar */
.cal-wrap{padding:12px 14px;flex:1;overflow-y:auto}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdow{font-size:10px;font-weight:600;text-align:center;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.05em}
.ccell{min-height:76px;border:1px solid var(--border);border-radius:var(--r);padding:5px 6px;cursor:pointer;background:var(--surface);transition:border-color .12s}
.ccell:hover{border-color:var(--bstrong)}
.ccell.today{border-color:var(--accent)}
.ccell.dim{background:var(--gray);opacity:.45;cursor:default}
.cdn{font-size:10px;color:var(--t3);margin-bottom:3px;display:flex;align-items:center}
.today .cdn span{background:var(--accent);color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.cpill{font-size:9px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;line-height:1.35}
.cmore{font-size:9px;color:var(--t3)}

/* list */
.list-wrap{padding:12px 14px;flex:1;overflow-y:auto}
.lhdr{display:grid;grid-template-columns:86px 1fr 1fr 82px 72px 90px;gap:8px;padding:5px 11px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);background:var(--gray);border-radius:var(--r);margin-bottom:5px}
.lrow{display:grid;grid-template-columns:86px 1fr 1fr 82px 72px 90px;gap:8px;align-items:start;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);margin-bottom:3px;transition:border-color .1s}
.lrow:hover{border-color:var(--bstrong)}
.ld{font-size:11px;color:var(--t2)}
.lt2{font-size:10px;color:var(--t3)}
/* title cell — shown after publish */
.l-title{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-top:1px}
.l-title-pending{font-size:11px;font-style:italic;color:var(--t3);padding-top:2px}
/* topic cell — always shown */
.l-topic{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-top:2px}
.lsite{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2);overflow:hidden}
.lsn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lact{display:flex;gap:3px;justify-content:flex-end;align-items:center}

/* badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.b-sch{background:var(--abg);color:var(--atx)}
.b-pub{background:var(--gbg);color:var(--gtx)}
.b-dra{background:var(--gray);color:var(--t3)}
.b-fai{background:var(--rbg);color:var(--rtx)}
.b-run{background:var(--ybg);color:var(--ytx)}

/* modals */
.mbd{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding-top:56px;z-index:200}
.modal{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);width:520px;max-width:calc(100vw - 32px);max-height:calc(100vh - 90px);overflow-y:auto;padding:22px}
.modal.wide{width:580px}
.mtitle{font-size:16px;font-weight:600;margin-bottom:14px}
.mtabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:14px}
.mtab{font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font)}
.mtab.on{color:var(--text);border-bottom-color:var(--accent)}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:18px}

/* fields */
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--t2);margin-bottom:3px}
.field input,.field select,.field textarea{width:100%;padding:7px 10px;border:1px solid var(--bstrong);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field textarea{resize:vertical;min-height:86px;line-height:1.55}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11px;color:var(--t3);margin-top:3px}
.mono{font-family:var(--mono)!important;font-size:12px!important;letter-spacing:.03em}

/* connection test */
.conn-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border);background:var(--gray);margin-bottom:10px;font-size:12px}

/* queue preview */
.qprev{border:1px solid var(--border);border-radius:var(--r);max-height:120px;overflow-y:auto;background:var(--gray);padding:7px 9px}
.qrow{display:flex;gap:8px;padding:2px 0;border-bottom:1px solid var(--border);font-size:11px}
.qrow:last-child{border-bottom:none}
.qdate{color:var(--t3);min-width:50px;flex-shrink:0}

/* log */
.logp{border:1px solid var(--border);border-radius:var(--r);background:#0f172a;padding:10px 12px;max-height:200px;overflow-y:auto;font-family:var(--mono);font-size:11px;line-height:1.7}
.ll{display:flex;gap:9px}
.lts{color:#64748b;flex-shrink:0}
.li{color:#94a3b8}.lok{color:#4ade80}.le{color:#f87171}.lw{color:#fbbf24}

/* progress */
.pbar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:7px 0}
.pfill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* toast */
.toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:7px;z-index:500}
.toast{padding:9px 15px;border-radius:var(--r);font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;animation:si .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.t-ok{background:var(--gbg);color:var(--gtx);border:1px solid #bbf7d0}
.t-err{background:var(--rbg);color:var(--rtx);border:1px solid #fecaca}
.t-info{background:var(--abg);color:var(--atx);border:1px solid #bfdbfe}
@keyframes si{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

.day-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.day-row:last-child{border-bottom:none}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3)}

/* push topic picker */
.ptopic-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;cursor:pointer;transition:border-color .1s}
.ptopic-row:hover{border-color:var(--accent)}
.ptopic-row.sel{border-color:var(--accent);background:var(--abg)}
.pradio{width:13px;height:13px;border-radius:50%;border:2px solid var(--bstrong);flex-shrink:0}
.ptopic-row.sel .pradio{border-color:var(--accent);background:var(--accent)}

/* pillar pages */
.pillar-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;background:var(--surface)}
/* tag grid */
.tag-chip{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;user-select:none;transition:border-color .1s,background .1s;font-size:11px;color:var(--t2)}
.tag-chip:hover{border-color:var(--bstrong)}
.tag-chip.on{border-color:var(--accent);background:var(--abg);color:var(--atx)}
.tag-chip input[type=checkbox]{width:13px;height:13px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────
const COLORS=['#2563eb','#059669','#dc2626','#9333ea','#ea580c','#0891b2'];
const PBG=['#eff6ff','#f0fdf4','#fef2f2','#faf5ff','#fff7ed','#ecfeff'];
const PTX=['#1d4ed8','#15803d','#991b1b','#7e22ce','#c2410c','#0e7490'];
const SK='cc_v3';
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const D1=`how to find local business leads
how to build a B2B prospect list
local business prospecting tips
how to find small business contact information
best ways to get business leads without a subscription
how insurance agents find new clients
real estate prospecting by zip code
roofing contractor leads by zip code
how to find HVAC contractor contact info
ZoomInfo alternatives for local sales reps
cold outreach tips for local businesses
sales territory mapping by zip code`;

const D2=`finance news daily roundup
stock market momentum analysis
crypto market update
fed reserve policy watch
earnings season preview
investment strategy for retail traders
economic indicators explained
options trading basics
ETF investing guide
sector rotation strategy`;

// ─── STATE ────────────────────────────────────────────────────────────
function defState(){return{
  anthropicKey:'',unsplashKey:'',
  sites:[
    {id:'s1',name:'BizInZip',url:'bizinzip.com',wpUrl:'',wpUser:'admin',wpPass:'',category:'Blog',freq:'daily',schedHour:7,schedMin:0,topic_idx:0,
     topics:D1.trim().split('\n'),description:'BizInZip is a pay-as-you-go local business lead finder.',
     audience:'insurance agents, real estate brokers, sales reps',tone:'practical, direct, results-focused',
     niche:'local B2B lead generation',usp:'search free, pay $0.10 per contact — no subscription'},
    {id:'s2',name:'CallingMarkets',url:'callingmarkets.com',wpUrl:'',wpUser:'admin',wpPass:'',category:'News',freq:'daily',schedHour:8,schedMin:30,topic_idx:0,
     topics:D2.trim().split('\n'),description:'CallingMarkets is a momentum-based financial signals publication.',
     audience:'retail traders, crypto traders, long-term investors',tone:'balanced, analytical, like a sharp Bloomberg piece',
     niche:'finance and markets',usp:'momentum-based signals for retail traders'},
  ],
  posts:[],view:'calendar',activeSite:null,
  year:new Date().getFullYear(),month:new Date().getMonth(),
};}

let S=loadState();
function loadState(){
  try{
    const sv=localStorage.getItem(SK);
    if(sv){const p=JSON.parse(sv);p.posts=(p.posts||[]).map(x=>({...x,date:new Date(x.date)}));return{...defState(),...p};}
  }catch(e){}
  return defState();
}
function save(){try{localStorage.setItem(SK,JSON.stringify({...S}));}catch(e){}}

// ─── SCHEDULE — show only 3 upcoming per site ─────────────────────────
function buildSchedule(){
  const now=new Date();
  const manual=S.posts.filter(p=>p.manual);
  const gen=[];
  S.sites.forEach(site=>{
    const topics=site.topics||[];if(!topics.length)return;
    let cursor=site.topic_idx||0,shown=0;
    for(let d=0;d<90&&shown<3;d++){
      const show=site.freq==='daily'||(site.freq==='weekly'&&d%7===0)||(site.freq==='biweekly'&&d%14===0);
      if(!show)continue;
      const dt=new Date(now);dt.setDate(dt.getDate()+d);dt.setHours(site.schedHour,site.schedMin,0,0);
      if(dt<=now)continue;
      const parsed=parseTopic(topics[cursor%topics.length]);
      gen.push({id:`g_${site.id}_${d}`,siteId:site.id,topic:parsed.raw,displayTopic:parsed.label,title:null,date:new Date(dt),status:'scheduled',manual:false});
      cursor++;shown++;
    }
  });
  S.posts=[...manual,...gen];
}
buildSchedule();

// ─── HELPERS ──────────────────────────────────────────────────────────
const f12=(h,m)=>{const ap=h>=12?'pm':'am';const hh=h%12||12;return`${hh}:${String(m).padStart(2,'0')}${ap}`};
const fS=d=>`${MS[d.getMonth()]} ${d.getDate()}`;
const C=i=>COLORS[i%COLORS.length];
const PB=i=>PBG[i%PBG.length];
const PT=i=>PTX[i%PTX.length];
const sI=id=>S.sites.findIndex(s=>s.id===id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const NOW=()=>new Date().toTimeString().slice(0,8);

function suggestTime(){
  const taken=S.sites.map(s=>s.schedHour*60+s.schedMin);
  let t=7*60;while(taken.some(h=>Math.abs(h-t)<30))t+=30;
  return{h:Math.floor(t/60),m:t%60};
}
function ow(){
  for(let i=0;i<S.sites.length;i++)for(let j=i+1;j<S.sites.length;j++){
    const d=Math.abs((S.sites[i].schedHour*60+S.sites[i].schedMin)-(S.sites[j].schedHour*60+S.sites[j].schedMin));
    if(d<30)return`${S.sites[i].name} &amp; ${S.sites[j].name} within 30 min`;
  }return'';
}
function qPrev(topics,freq,h,m,start=0,n=6){
  if(!topics||!topics.length)return'<div style="font-size:11px;color:var(--t3);padding:4px 0">No topics yet</div>';
  const now=new Date();let html='',cursor=start,d=0,shown=0;
  while(shown<n&&d<90){
    const show=freq==='daily'||(freq==='weekly'&&d%7===0)||(freq==='biweekly'&&d%14===0);
    if(show){const dt=new Date(now);dt.setDate(dt.getDate()+d);
      html+=`<div class="qrow"><span class="qdate">${fS(dt)}</span><span style="color:var(--text)">${esc(parseTopic(topics[cursor%topics.length]).label)}</span></div>`;
      cursor++;shown++;}d++;
  }return html;
}

// ─── TOPIC PARSING ────────────────────────────────────────────────────
// Topics can be plain ("Tax Planning") or pipe-separated ("Tax Planning | deductions, entity selection, year-end strategies")
// The label (before |) is shown in the calendar; the hint (after |) is injected into the article prompt.
function parseTopic(raw){
  const parts=(raw||'').split('|');
  return{
    label:parts[0].trim(),
    hint:parts[1]?parts[1].trim():'',
    raw:raw||'',
  };
}

// ─── TOAST ────────────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.createElement('div');el.className=`toast t-${type}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3500);
}

// ─── ANTHROPIC API ────────────────────────────────────────────────────
async function claude(prompt,maxTok=2800){
  if(!S.anthropicKey)throw new Error('No Anthropic API key — click "Keys" in top bar.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':S.anthropicKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok,messages:[{role:'user',content:prompt}]}),
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||`API ${r.status}`);}
  return(await r.json()).content[0].text.trim();
}

// ─── SITEMAP FETCHER ──────────────────────────────────────────────────
// Fetches the sitemap XML and parses out all <loc> URLs.
// Returns an array of URL strings. Caps at 150 to keep prompt size sane.
async function fetchSitemapUrls(sitemapUrl,logFn){
  if(!sitemapUrl)return[];
  try{
    // Use a CORS proxy approach — fetch via no-cors won't give us body,
    // so we attempt direct first (works when the site has CORS open),
    // then fall back silently so publishing still succeeds.
    const r=await fetch(sitemapUrl,{method:'GET',headers:{Accept:'application/xml,text/xml,*/*'}});
    if(!r.ok)throw new Error(`Sitemap returned ${r.status}`);
    const xml=await r.text();
    // Parse all <loc> tags
    const matches=[...xml.matchAll(/<loc>([\s\S]*?)<\/loc>/gi)];
    const urls=matches.map(m=>m[1].trim()).filter(u=>u.startsWith('http')).slice(0,150);
    if(logFn)logFn(`Sitemap: ${urls.length} URLs loaded`,'lok');
    return urls;
  }catch(e){
    // Non-fatal — if sitemap can't be fetched (CORS etc) we continue without it
    if(logFn)logFn(`Sitemap fetch skipped: ${e.message} — pillar pages still apply`,'lw');
    return[];
  }
}

async function writeArticle(topic,site,logFn,sitemapUrls=[]){
  const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  // Parse topic — supports "Label | hint about angles and subtopics"
  const {label:topicLabel,hint:topicHint}=parseTopic(topic);

  // Build internal linking block using REAL urls only
  const pillarPages=site.pillarPages||[];

  let linkingBlock='';
  if(pillarPages.length||sitemapUrls.length){
    linkingBlock+='\nINTERNAL LINKING RULES — CRITICAL:\n';
    linkingBlock+='You may ONLY link to URLs from the two lists below. Do NOT invent, guess, or construct any URLs. If no URL from these lists fits naturally, do not add a link.\n\n';

    if(pillarPages.length){
      linkingBlock+='PILLAR PAGES (highest priority — link to these first when relevant, using the exact anchor text specified):\n';
      pillarPages.forEach(p=>{
        linkingBlock+=`  Anchor: "${p.keyphrase}" → ${p.url}\n`;
      });
      linkingBlock+='\n';
    }

    if(sitemapUrls.length){
      linkingBlock+=`SITEMAP PAGES (use any of these as supporting links where genuinely relevant — pick the URL that best matches the context):\n`;
      // Group by path depth to keep the list readable
      sitemapUrls.forEach(u=>{ linkingBlock+=`  ${u}\n`; });
      linkingBlock+='\n';
    }

    linkingBlock+='LINK FORMAT: <a href="EXACT_URL_FROM_LISTS_ABOVE">descriptive anchor text</a>\n';
    linkingBlock+='Aim for 2-4 internal links per article. Only link when it genuinely helps the reader.\n';
  }

  // Word count target
  const wc=site.wordCount||800;
  const wcLow=Math.round(wc*0.9);
  const wcHigh=Math.round(wc*1.1);

  // Allowed tags — exactly ONE, the closest match to the topic
  const allowedTagIds=site.allowedTagIds||[];
  const wpTagPool=site.wpTagPool||[];
  const allowedTagNames=wpTagPool.filter(t=>allowedTagIds.includes(t.id)).map(t=>t.name);
  const tagInstruction=allowedTagNames.length
    ? `TAG: Choose exactly ONE tag from this list that most closely matches the topic — do not invent tags, do not choose more than one:\n${allowedTagNames.join(', ')}`
    : 'TAG: Suggest exactly one short, relevant tag.';

  const text=await claude(`You are a content writer for ${site.name}, a ${site.niche||'general'} website.

TODAY: ${today}
TOPIC AREA: ${topicLabel}${topicHint?`\nCONTENT FOCUS: ${topicHint}`:''}

SITE INFO:
${site.description||`${site.name} serves ${site.audience||'general readers'}.`}
AUDIENCE: ${site.audience||'general readers'}
TONE: ${site.tone||'helpful and informative'}
${site.usp?`USP (reference naturally): ${site.usp}`:''}
${linkingBlock}
TITLE RULE: Create an original, compelling SEO headline based on the topic area and content focus. Do NOT simply restate the topic word-for-word. Make it specific and search-friendly. Example — if topic is "Tax Planning" with focus "deductions, entity selection", a strong title is "7 Tax Planning Moves Every Small Business Owner Should Make Before Year-End".

ARTICLE REQUIREMENTS:
- Target length: ${wcLow}–${wcHigh} words (target: ${wc} words)
- SEO-optimised, primary keyword used naturally throughout
- Strong hook opening paragraph
- 2-3 subheadings using <h2> tags
- Actionable insights drawn from the content focus angles
- HTML only: <p>, <strong>, <h2>, <a href="..."> — no markdown
- Internal links MUST use only URLs from the lists provided above — no exceptions
- No disclaimers or "this is not advice" language
- End with a clear call to action

${tagInstruction}

Respond ONLY with valid JSON (no markdown fences):
{"title":"<compelling headline>","content":"<full article HTML>","excerpt":"<standard WP excerpt, 1-2 sentences>","yoast_keyphrase":"<2-5 word focus keyphrase — the primary SEO term this article targets>","yoast_meta":"<meta description 120-158 chars — must include the focus keyphrase, be written to earn a click, no truncation>","tags":["single_tag"],"search_term":"<3-5 word Unsplash photo search>"}`,Math.max(2000,Math.round(wc*2.2)));
  const m=text.match(/\{[\s\S]*\}/);if(!m)throw new Error('Could not parse article JSON from Claude');
  const parsed=JSON.parse(m[0]);
  // Enforce single tag
  if(Array.isArray(parsed.tags))parsed.tags=parsed.tags.slice(0,1);
  // Enforce meta description character range — trim if over, warn if under
  if(parsed.yoast_meta){
    if(parsed.yoast_meta.length>158)parsed.yoast_meta=parsed.yoast_meta.slice(0,155)+'...';
    if(parsed.yoast_meta.length<120)parsed.yoast_meta=parsed.yoast_meta.trim(); // keep as-is, just tidy
  }
  return parsed;
}

// ─── UNSPLASH ─────────────────────────────────────────────────────────
async function fetchPhoto(term){
  if(!S.unsplashKey)throw new Error('No Unsplash API key — click "Keys" in top bar.');
  const r=await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(term)}&per_page=5&orientation=landscape&content_filter=high`,{
    headers:{'Authorization':`Client-ID ${S.unsplashKey}`}
  });
  if(!r.ok)throw new Error(`Unsplash ${r.status}`);
  const d=await r.json();
  if(!d.results?.length)throw new Error(`No photo found for "${term}"`);
  const p=d.results[0];
  fetch(p.links.download_location,{headers:{'Authorization':`Client-ID ${S.unsplashKey}`}}).catch(()=>{});
  return{url:p.urls.regular,photographer:p.user.name,photographerUrl:p.user.links.html,alt:p.alt_description||term};
}

// ─── WORDPRESS ────────────────────────────────────────────────────────
async function wpReq(site,path,opts={}){
  const base=site.wpUrl.replace(/\/$/,'');
  const creds=btoa(`${site.wpUser}:${site.wpPass}`);
  return fetch(`${base}/wp-json/wp/v2${path}`,{
    ...opts,
    headers:{'Authorization':`Basic ${creds}`,'Content-Type':'application/json',...(opts.headers||{})},
  });
}

async function testWP(site){
  let r;
  try{r=await wpReq(site,'/users/me');}
  catch(e){throw new Error('Could not reach WordPress — check URL and network');}
  if(r.status===401||r.status===403)throw new Error('Authentication failed — check username and app password');
  if(r.status===404)throw new Error('WordPress REST API not found — check WP URL (needs /wp-json support)');
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.message||`HTTP ${r.status}`);}
  const u=await r.json();return u.name||'Connected';
}

async function getOrCreateCat(site,name){
  const r=await wpReq(site,`/categories?search=${encodeURIComponent(name)}&per_page=20`);
  if(r.ok){
    const cats=await r.json();
    const found=cats.find(c=>c.name.toLowerCase()===name.toLowerCase());
    if(found)return found.id;
  }
  const cr=await wpReq(site,'/categories',{method:'POST',body:JSON.stringify({name})});
  if(!cr.ok){const e=await cr.json().catch(()=>({}));throw new Error(`Category error: ${e?.message||cr.status}`);}
  return(await cr.json()).id;
}

async function uploadPhoto(site,photo){
  const imgR=await fetch(photo.url);
  if(!imgR.ok)throw new Error('Could not download photo from Unsplash');
  const blob=await imgR.blob();
  const base=site.wpUrl.replace(/\/$/,'');
  const creds=btoa(`${site.wpUser}:${site.wpPass}`);
  const r=await fetch(`${base}/wp-json/wp/v2/media`,{
    method:'POST',
    headers:{'Authorization':`Basic ${creds}`,'Content-Disposition':`attachment; filename="cc-${Date.now()}.jpg"`,'Content-Type':'image/jpeg'},
    body:blob,
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Media upload failed: ${e?.message||r.status}`);}
  const media=await r.json();
  const credit=`Photo by <a href="${photo.photographerUrl}" target="_blank">${photo.photographer}</a> on <a href="https://unsplash.com" target="_blank">Unsplash</a>`;
  await wpReq(site,`/media/${media.id}`,{method:'POST',body:JSON.stringify({caption:credit,alt_text:photo.alt})});
  return media.id;
}

async function publishPost(site,article,mediaId,logFn){
  const catId=await getOrCreateCat(site,site.category||'Blog');
  logFn(`Category: ${site.category} (ID ${catId})`,'ok');

  // Resolve Claude's single tag choice against the allowed pool
  const allowedTagIds=site.allowedTagIds||[];
  const wpTagPool=site.wpTagPool||[];
  let finalTagIds=[];

  if(allowedTagIds.length&&wpTagPool.length){
    // Match Claude's top tag name against allowed pool (case-insensitive), take first match only
    const chosenName=((article.tags||[])[0]||'').toLowerCase().trim();
    const match=wpTagPool.find(t=>allowedTagIds.includes(t.id)&&t.name.toLowerCase().trim()===chosenName);
    if(match){
      finalTagIds=[match.id];
      logFn(`Tag: "${match.name}" (ID ${match.id})`,'ok');
    } else {
      logFn(`Tag: no match for "${article.tags?.[0]||''}" in allowed pool — publishing without tag`,'lw');
    }
  } else if(article.tags?.length){
    // No pool configured — get-or-create the single suggested tag
    const single=article.tags[0];
    const ids=await getOrCreateTags(site,[single]);
    finalTagIds=ids.slice(0,1);
    if(finalTagIds.length)logFn(`Tag: "${single}" created/matched`,'ok');
  }

  const credit=article._photo?`<p style="font-size:11px;color:#9a9a9a;margin-top:24px">Photo: <a href="${article._photo.photographerUrl}">${article._photo.photographer}</a> / Unsplash</p>`:'';
  const postData={
    title:article.title,
    content:article.content+credit,
    excerpt:article.excerpt||'',
    status:'publish',
    categories:catId?[catId]:[],
    tags:finalTagIds,
    comment_status:'open',
    // Yoast SEO fields — written via meta on initial post creation
    meta:{
      _yoast_wpseo_focuskw: article.yoast_keyphrase||'',
      _yoast_wpseo_metadesc: article.yoast_meta||article.excerpt||'',
    },
  };
  if(mediaId)postData.featured_media=mediaId;

  const r=await wpReq(site,'/posts',{method:'POST',body:JSON.stringify(postData)});
  if(!r.ok){
    const e=await r.json().catch(()=>({}));
    const hint=r.status===401?'Authentication failed — verify WP credentials':r.status===403?'Permission denied — ensure your WP user can publish posts':r.status===404?'REST API endpoint not found — check WP URL':'Check WP URL, credentials, and that REST API is enabled';
    throw new Error(`Publish failed (${r.status}): ${e?.message||hint}`);
  }
  const post=await r.json();

  // Yoast meta fields — also attempt a direct update on the created post
  // (belt-and-suspenders: some Yoast versions need a separate PATCH)
  if(article.yoast_keyphrase||article.yoast_meta){
    try{
      await wpReq(site,`/posts/${post.id}`,{
        method:'POST',
        body:JSON.stringify({
          meta:{
            _yoast_wpseo_focuskw: article.yoast_keyphrase||'',
            _yoast_wpseo_metadesc: article.yoast_meta||article.excerpt||'',
          }
        })
      });
      logFn(`Yoast: keyphrase "${article.yoast_keyphrase}" · meta ${(article.yoast_meta||'').length} chars`,'ok');
    }catch(e){
      logFn('Yoast meta write failed — post published but Yoast fields may need manual entry','lw');
    }
  }
  logFn('Verifying post is live…','li');
  await new Promise(res=>setTimeout(res,2000));
  try{await fetch(post.link,{method:'HEAD',mode:'no-cors'});logFn(`Post live: ${post.link}`,'ok');}
  catch(e){logFn('Note: could not verify URL (CORS) — post was created in WordPress','lw');}
  return post;
}

async function getOrCreateTags(site,tagNames){
  const ids=[];
  for(const name of(tagNames||[]).slice(0,5)){
    try{
      const r=await wpReq(site,'/tags',{method:'POST',body:JSON.stringify({name})});
      if(r.status===201){ids.push((await r.json()).id);continue;}
      const s=await wpReq(site,`/tags?search=${encodeURIComponent(name)}&per_page=5`);
      if(s.ok){const res=await s.json();if(res[0])ids.push(res[0].id);}
    }catch(e){}
  }
  return ids;
}

// ─── PIPELINE ─────────────────────────────────────────────────────────
async function runSite(site,logFn,overrideTopic=null){
  if(!site.wpUrl||!site.wpUser||!site.wpPass)throw new Error('WordPress credentials missing — edit the site to add them.');
  if(!S.unsplashKey)throw new Error('No Unsplash API key — click "Keys" in top bar.');
  const topics=site.topics||[];if(!topics.length)throw new Error('No topics configured.');
  const idx=site.topic_idx||0;
  const topic=overrideTopic||topics[idx%topics.length];
  logFn(`Topic area: ${parseTopic(topic).label}`,'li');

  // Fetch sitemap URLs so Claude only links to real pages
  let sitemapUrls=[];
  if(site.sitemapUrl){
    logFn('Fetching sitemap…','li');
    sitemapUrls=await fetchSitemapUrls(site.sitemapUrl,logFn);
  }

  logFn('Writing article via Claude…','li');
  const article=await writeArticle(topic,site,logFn,sitemapUrls);
  logFn(`Title: "${article.title}"`,'lok');

  logFn(`Fetching photo for: ${article.search_term}`,'li');
  let mediaId=null;
  try{
    const photo=await fetchPhoto(article.search_term);
    article._photo=photo;
    logFn(`Photo: ${photo.photographer} / Unsplash`,'lok');
    logFn('Uploading photo to WordPress…','li');
    mediaId=await uploadPhoto(site,photo);
    logFn('Featured image uploaded','lok');
  }catch(e){logFn(`Photo skipped: ${e.message}`,'lw');}

  logFn('Publishing to WordPress…','li');
  const post=await publishPost(site,article,mediaId,logFn);

  if(!overrideTopic){
    site.topic_idx=((idx+1)%topics.length);
    site.last_run=new Date().toISOString();
  }
  const todayStr=new Date().toDateString();
  const sched=S.posts.find(p=>p.siteId===site.id&&p.date.toDateString()===todayStr&&p.status==='scheduled');
  if(sched){sched.status='published';sched.title=article.title;sched.url=post.link;}
  buildSchedule();save();
  return post.link;
}

function renderCal(){
  const y=S.year,m=S.month,fd=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),today=new Date();
  const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const posts=S.posts.filter(p=>S.activeSite?p.siteId===S.activeSite:true);
  const byDay={};
  posts.forEach(p=>{if(p.date.getFullYear()===y&&p.date.getMonth()===m){const k=p.date.getDate();(byDay[k]=byDay[k]||[]).push(p);}});
  let c=DAYS.map(d=>`<div class="cdow">${d}</div>`).join('');
  for(let i=0;i<fd;i++)c+=`<div class="ccell dim"></div>`;
  for(let d=1;d<=days;d++){
    const isT=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    const dp=byDay[d]||[];
    const pills=dp.slice(0,3).map(p=>{
      const idx=sI(p.siteId);const bg=idx>=0?PB(idx):'#f4f4f2',tx=idx>=0?PT(idx):'#9a9a92';
      const published=p.status==='published';
      // published → show generated title (dimmed); upcoming → show topic label
      const label=published&&p.title ? p.title : (p.displayTopic||parseTopic(p.topic).label);
      const op=published?.55:1;
      return`<div class="cpill" style="background:${bg};color:${tx};opacity:${op}" title="${esc(published&&p.title?`Title: ${p.title}\nTopic: ${p.displayTopic||parseTopic(p.topic).label}`:`Topic: ${p.displayTopic||parseTopic(p.topic).label}`)}">${esc(label)}</div>`;
    }).join('');
    const more=dp.length>3?`<div class="cmore">+${dp.length-3}</div>`:'';
    c+=`<div class="ccell${isT?' today':''}" data-day="${d}"><div class="cdn"><span>${d}</span></div>${pills}${more}</div>`;
  }
  return`<div class="cal-wrap"><div class="cgrid">${c}</div></div>`;
}

function renderList(){
  const posts=S.posts.filter(p=>S.activeSite?p.siteId===S.activeSite:true).sort((a,b)=>a.date-b.date);
  if(!posts.length)return`<div class="list-wrap"><div class="empty-state"><div style="font-size:32px;margin-bottom:8px">&#128197;</div><div>No posts found</div></div></div>`;
  const rows=posts.map(p=>{
    const idx=sI(p.siteId);const col=idx>=0?C(idx):'#9a9a92';const site=S.sites[idx];
    const bc={scheduled:'b-sch',published:'b-pub',draft:'b-dra',failed:'b-fai',running:'b-run'}[p.status]||'b-dra';
    const titleCell=p.title
      ? `<div class="l-title" title="${esc(p.title)}">${esc(p.title)}</div>`
      : `<div class="l-title-pending">Generated at publish</div>`;
    const topicLabel=p.displayTopic||parseTopic(p.topic).label;
    return`<div class="lrow">
      <div><div class="ld">${fS(p.date)}</div><div class="lt2">${f12(p.date.getHours(),p.date.getMinutes())}</div></div>
      ${titleCell}
      <div class="l-topic" title="${esc(topicLabel)}">${esc(topicLabel)}</div>
      <div class="lsite"><div class="sdot" style="background:${col};width:7px;height:7px;flex-shrink:0"></div><span class="lsn">${esc(site?.name||'?')}</span></div>
      <div><span class="badge ${bc}">${p.status}</span></div>
      <div class="lact">

  }).join('');
  return`<div class="list-wrap"><div class="lhdr"><div>Date</div><div>Title</div><div>Topic</div><div>Site</div><div>Status</div><div></div></div>${rows}</div>`;

function addLog(logId,msg,cls='li'){

// ─── TAG GRID HELPER ──────────────────────────────────────────────────
function renderTagGrid(tagPool,allowedIds){
  if(!tagPool||!tagPool.length)return'';
  return tagPool.map(t=>{
    const on=(allowedIds||[]).includes(t.id);
    return`<label class="tag-chip${on?' on':''}" data-tagid="${t.id}">
      <input type="checkbox" value="${t.id}" ${on?'checked':''} onchange="handleTagCheck(this)">
      <span>${esc(t.name)}</span>
      <span style="font-size:9px;color:var(--t3);margin-left:auto">${t.count||0}</span>
    </label>`;
  }).join('');
}

function handleTagCheck(cb){
  // read current allowed list from hidden input
  const store=document.getElementById('s-tag-allowed');
  if(!store)return;
  let ids=[];try{ids=JSON.parse(store.value||'[]');}catch(e){}
  const id=parseInt(cb.value);
  if(cb.checked){if(!ids.includes(id))ids.push(id);}
  else{ids=ids.filter(x=>x!==id);}
  store.value=JSON.stringify(ids);
  // update chip styling
  const chip=cb.closest('.tag-chip');
  if(chip)chip.classList.toggle('on',cb.checked);
  // update status line
  const pool=document.getElementById('s-tag-pool');
  let poolArr=[];try{poolArr=JSON.parse(pool?.value||'[]');}catch(e){}
  const status=document.getElementById('s-tag-status');
  if(status)status.textContent=`${poolArr.length} tags loaded — ${ids.length} selected`;
}

async function fetchWPTags(site){
  // fetch all tags (paginated, up to 200)
  const base=site.wpUrl.replace(/\/$/,'');
  const creds=btoa(`${site.wpUser}:${site.wpPass}`);
  const headers={'Authorization':`Basic ${creds}`};
  let page=1,all=[];
  while(true){
    const r=await fetch(`${base}/wp-json/wp/v2/tags?per_page=100&page=${page}&orderby=count&order=desc`,{headers});
    if(!r.ok)throw new Error(`Tags fetch failed: ${r.status}`);
    const batch=await r.json();
    if(!batch.length)break;
    all=[...all,...batch.map(t=>({id:t.id,name:t.name,count:t.count}))];
    if(batch.length<100)break;
    page++;
    if(page>2)break; // cap at 200
  }
  return all;
}

function hookPillarTab(currentPages){
  // keep a live copy we mutate
  let pages=[...currentPages];

  const refresh=()=>{
    const container=document.getElementById('s-pillars');
    const empty=document.getElementById('s-pillar-empty');
    if(container)container.innerHTML=renderPillarRows(pages);
    if(empty)empty.style.display=pages.length?'none':'block';
    // re-attach delete handlers
    document.querySelectorAll('[data-del-pillar]').forEach(btn=>{
      btn.onclick=()=>{pages.splice(parseInt(btn.dataset.delPillar),1);refresh();};
    });
    // expose to save handler via a closure on the element
    const phantom=document.getElementById('s-pillar-store');
    if(phantom)phantom.value=JSON.stringify(pages);
  };

  document.getElementById('s-add-pillar').onclick=()=>{
    openPillarEntryModal(newPage=>{
      pages.push(newPage);refresh();
    });
  };

  refresh();
  return()=>pages; // getter so save handler can call it
}

          btn.onclick=()=>{pages.splice(parseInt(btn.dataset.delPillar),1);

    let allowedTagIds=[];try{allowedTagIds=JSON.parse(document.getElementById('s-tag-allowed')?.value||'[]');}catch(e){}
    const d={name,url:document.getElementById('s-url').value.trim(),
      wpUrl:document.getElementById('s-wp').value.trim(),wpUser:document.getElementById('s-wpu').value.trim()||'admin',
      wpPass:document.getElementById('s-wpp').value||(isEdit?site.wpPass:''),
      category:document.getElementById('s-cat').value.trim()||'Blog',
      wpTagPool,allowedTagIds,
      freq:document.getElementById('s-freq').value,
      schedHour:parseInt(document.getElementById('s-h').value)||7,schedMin:parseInt(document.getElementById('s-m').value)||0,
      topics:topics.length?topics:(isEdit?site.topics:['New post']),
      wordCount:parseInt(document.getElementById('s-wordcount')?.value)||800,
      description:document.getElementById('s-desc')?.value.trim()||'',
      audience:document.getElementById('s-aud')?.value.trim()||'',
      tone:document.getElementById('s-tone')?.value.trim()||'',
      niche:document.getElementById('s-niche')?.value.trim()||'',
      usp:document.getElementById('s-usp')?.value.trim()||'',
      sitemapUrl:document.getElementById('s-sitemap')?.value.trim()||'',
      pillarPages,
    };
    if(isEdit){const idx=sI(siteId);S.sites[idx]={...site,...d};}
    else S.sites.push({id:'s'+Date.now(),topic_idx:0,...d});
    buildSchedule();save();closeModal();render();toast(isEdit?`${name} updated`:`${name} added`,'ok');
  };
}

// ─── RUN MODAL ────────────────────────────────────────────────────────
function openRunModal(siteId){
  const site=S.sites.find(s=>s.id===siteId);if(!site)return;
  const idx=site.topic_idx||0;
  const rawTopic=(site.topics||[])[idx%(site.topics?.length||1)]||'(no topic)';
  const {label:topicLabel,hint:topicHint}=parseTopic(rawTopic);
  openModal(`
    <div class="mtitle">Publish — ${esc(site.name)}</div>
    <div style="display:grid;grid-template-columns:52px 1fr;gap:6px 12px;margin-bottom:14px;align-items:start">
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding-top:10px">Topic</div>
      <div style="padding:8px 11px;background:var(--gray);border-radius:var(--r)">
        <div style="font-size:13px;font-weight:500">${esc(topicLabel)}</div>
        ${topicHint?`<div style="font-size:11px;color:var(--t3);margin-top:3px">${esc(topicHint)}</div>`:''}
      </div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);padding-top:10px">Title</div>
      <div style="font-size:12px;font-style:italic;color:var(--t3);padding:8px 11px;background:var(--gray);border-radius:var(--r)">Generated by Claude at publish time</div>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:10px">Topic <strong>#${idx+1}</strong> of ${site.topics?.length||0}</div>
    <div class="pbar"><div class="pfill" id="rp" style="width:0%"></div></div>
    <div class="logp" id="rlog"><div class="ll"><span class="lts">--:--:--</span><span class="li">Ready…</span></div></div>
    <div class="mact" style="margin-top:14px">
      <button class="btn btn-g" id="r-close">Close</button>
      <button class="btn btn-p" id="r-start">&#9654; Publish now</button>
    </div>
  `);
  document.getElementById('r-close').onclick=closeModal;
  document.getElementById('r-start').onclick=async()=>{
    const btn=document.getElementById('r-start');btn.disabled=true;btn.textContent='Publishing…';
    const L=(m,c)=>addLog('rlog',m,c);setP('rp',10);
    try{
      const url=await runSite(site,L);setP('rp',100);L(`✓ Live: ${url}`,'lok');
      btn.textContent='✓ Published';render();toast(`${site.name} published!`,'ok');
    }catch(e){L(`✗ ${e.message}`,'le');btn.disabled=false;btn.textContent='Retry';toast(`Failed: ${e.message}`,'err');}
  };
}

// ─── RUN ALL MODAL ────────────────────────────────────────────────────
function openRunAllModal(){
  const targets=S.sites.filter(s=>s.wpUrl&&s.wpPass);
  if(!targets.length){toast('No sites have WordPress credentials','err');return;}
  const rows=targets.map(s=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)">
    <div class="sdot" style="background:${C(sI(s.id))}"></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:500">${esc(s.name)}</div>
      <div style="font-size:10px;color:var(--t3)">Topic: ${esc(parseTopic((s.topics||[])[(s.topic_idx||0)%(s.topics?.length||1)]||'').label||'—')}</div>
      <div style="font-size:10px;font-style:italic;color:var(--t3)">Title: generated by Claude</div>
    </div>
    <span class="badge b-sch" id="ras-${s.id}">queued</span>
  </div>`).join('');
  openModal(`
    <div class="mtitle">Run all sites</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px">Publishes each site's next topic in sequence with 30s gap between sites to stagger API calls.</div>
    <div style="margin-bottom:12px">${rows}</div>
    <div class="pbar"><div class="pfill" id="rap" style="width:0%"></div></div>
    <div class="logp" id="ralog" style="max-height:150px"><div class="ll"><span class="lts">--:--:--</span><span class="li">Ready</span></div></div>
    <div class="mact" style="margin-top:14px">
      <button class="btn btn-g" id="ra-close">Close</button>
      <button class="btn btn-p" id="ra-start">&#9654; Run all</button>
    </div>
  `);
  document.getElementById('ra-close').onclick=closeModal;
  document.getElementById('ra-start').onclick=async()=>{
    const btn=document.getElementById('ra-start');btn.disabled=true;
    const L=(m,c)=>addLog('ralog',m,c);let done=0;
    for(const site of targets){
      const badge=document.getElementById(`ras-${site.id}`);
      if(badge){badge.className='badge b-run';badge.textContent='running';}
      L(`━━ ${site.name} ━━`,'li');
      try{
        await runSite(site,L);
        if(badge){badge.className='badge b-pub';badge.textContent='done';}
      }catch(e){
        if(badge){badge.className='badge b-fai';badge.textContent='failed';}
        L(`✗ ${e.message}`,'le');
      }
      done++;setP('rap',Math.round(done/targets.length*100));
      if(done<targets.length){L('Waiting 30s before next site…','lw');await new Promise(r=>setTimeout(r,30000));}
    }
    btn.textContent='✓ All done';render();toast('All sites processed','ok');
  };
}

// ─── PUSH ARTICLE MODAL ───────────────────────────────────────────────
function openPushModal(){
  if(!S.sites.length){toast('Add a site first','err');return;}
  const opts=S.sites.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  openModal(`
    <div class="mtitle">&#9889; Push article</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:14px">Publish immediately to any site. The topic cursor is <strong>not</strong> advanced — your schedule stays intact. Great for testing or urgent posts.</div>
    <div class="field"><label>Site</label><select id="pa-site">${opts}</select></div>
    <div class="field"><label>Topic / subject area</label>
      <input id="pa-topic" placeholder="e.g. how roofing contractors find leads in winter">
      <div class="fhint">Claude generates an original title — just enter the subject area here.</div>
    </div>
    <div style="font-size:11px;font-weight:500;color:var(--t2);margin-bottom:6px">Or pick from queue:</div>
    <div id="pa-queue"></div>
    <div class="pbar" style="display:none" id="pa-pbar"><div class="pfill" id="pa-prog" style="width:0%"></div></div>
    <div class="logp" style="display:none;max-height:150px" id="pa-log"></div>
    <div class="mact">
      <button class="btn btn-g" id="pa-close">Cancel</button>
      <button class="btn btn-gn" id="pa-run">&#9889; Push now</button>
    </div>
  `);
  const loadQ=()=>{
    const siteId=document.getElementById('pa-site')?.value;
    const site=S.sites.find(s=>s.id===siteId);
    const qEl=document.getElementById('pa-queue');if(!qEl)return;
    if(!site?.topics?.length){qEl.innerHTML='<div style="font-size:11px;color:var(--t3);margin-bottom:8px">No topics configured.</div>';return;}
    const start=site.topic_idx||0;
    const slice=site.topics.slice(start,start+5);
    qEl.innerHTML=slice.map(t=>{
      const {label,hint}=parseTopic(t);
      return`<div class="ptopic-row" data-t="${esc(t)}">
        <div class="pradio"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px">${esc(label)}</div>
          ${hint?`<div style="font-size:10px;color:var(--t3);margin-top:1px">${esc(hint)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    qEl.querySelectorAll('.ptopic-row').forEach(row=>{
      row.addEventListener('click',()=>{
        qEl.querySelectorAll('.ptopic-row').forEach(r=>r.classList.remove('sel'));
        row.classList.add('sel');
        // store the raw topic (with hint) in the input so runSite gets the full value
        const inp=document.getElementById('pa-topic');if(inp)inp.value=row.dataset.t;
      });
    });
  };
  document.getElementById('pa-site')?.addEventListener('change',loadQ);loadQ();
  document.getElementById('pa-close').onclick=closeModal;
  document.getElementById('pa-run').onclick=async()=>{
    const siteId=document.getElementById('pa-site')?.value;
    const topic=document.getElementById('pa-topic')?.value.trim();
    const site=S.sites.find(s=>s.id===siteId);
    if(!site){toast('Select a site','err');return;}
    if(!topic){toast('Enter a topic','err');return;}
    if(!site.wpUrl||!site.wpPass){toast('WordPress credentials missing for this site','err');return;}
    const btn=document.getElementById('pa-run');btn.disabled=true;btn.textContent='Pushing…';
    const logEl=document.getElementById('pa-log');const pbar=document.getElementById('pa-pbar');
    if(logEl)logEl.style.display='';if(pbar)pbar.style.display='';setP('pa-prog',10);
    const L=(m,c)=>addLog('pa-log',m,c);
    try{
      const url=await runSite(site,L,topic);
      setP('pa-prog',100);L(`✓ Live: ${url}`,'lok');
      btn.textContent='✓ Pushed';render();toast('Article pushed!','ok');
    }catch(e){L(`✗ ${e.message}`,'le');btn.disabled=false;btn.textContent='&#9889; Retry';toast(`Push failed: ${e.message}`,'err');}
  };
}

// ─── ADD POST MODAL ───────────────────────────────────────────────────
function openAddPostModal(){
  const now=new Date();
  const ds=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  openModal(`
    <div class="mtitle">Schedule placeholder</div>
    <div style="font-size:12px;color:var(--t2);margin-bottom:12px">Adds a slot to the calendar. Use "Push article" to publish immediately.</div>
    <div class="field"><label>Site</label><select id="np-site">${S.sites.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Topic / subject</label><input id="np-topic" placeholder="Article topic area"></div>
    <div class="frow">
      <div class="field"><label>Date</label><input id="np-date" type="date" value="${ds}"></div>
      <div class="field"><label>Time (UTC)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="np-h" type="number" min="0" max="23" value="7" style="width:58px">
          <span style="color:var(--t3)">:</span>
          <input id="np-m" type="number" min="0" max="59" step="15" value="0" style="width:58px">
        </div>
      </div>
    </div>
    <div class="mact">
      <button class="btn btn-g" id="np-cancel">Cancel</button>
      <button class="btn btn-p" id="np-save">Add to calendar</button>
    </div>
  `);
  document.getElementById('np-cancel').onclick=closeModal;
  document.getElementById('np-save').onclick=()=>{
    const ds=document.getElementById('np-date').value;if(!ds)return;
    const dt=new Date(ds+'T00:00:00');
    dt.setHours(parseInt(document.getElementById('np-h').value)||7,parseInt(document.getElementById('np-m').value)||0,0,0);
    S.posts.push({id:'m_'+Date.now(),siteId:document.getElementById('np-site').value,topic:document.getElementById('np-topic').value||'Untitled',title:null,date:dt,status:'scheduled',manual:true});
    save();closeModal();render();toast('Added to calendar','ok');
  };
}

// ─── DAY MODAL ────────────────────────────────────────────────────────
function openDayModal(day){
  const y=S.year,m=S.month;
  const dp=S.posts.filter(p=>p.date.getFullYear()===y&&p.date.getMonth()===m&&p.date.getDate()===day).sort((a,b)=>a.date-b.date);
  const rows=dp.map(p=>{
    const idx=sI(p.siteId);const col=idx>=0?C(idx):'#9a9a92';
    const bc={scheduled:'b-sch',published:'b-pub',draft:'b-dra',failed:'b-fai'}[p.status]||'b-dra';
    const tLabel=p.displayTopic||parseTopic(p.topic).label;
    const tHint=parseTopic(p.topic).hint;
    return`<div class="day-row">
      <div style="font-size:11px;color:var(--t3);min-width:44px;flex-shrink:0">${f12(p.date.getHours(),p.date.getMinutes())}</div>
      <div class="sdot" style="background:${col};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        ${p.title
          ? `<div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${esc(p.title)}</div>
             <div style="font-size:10px;color:var(--t3);margin-top:1px">Topic: ${esc(tLabel)}${tHint?` · ${esc(tHint)}`:''}</div>`
          : `<div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)">${esc(tLabel)}</div>
             ${tHint?`<div style="font-size:10px;color:var(--t3);margin-top:1px">${esc(tHint)}</div>`:''}
             <div style="font-size:10px;font-style:italic;color:var(--t3);margin-top:1px">Title generated at publish</div>`
        }
        <div style="font-size:10px;color:var(--t3);margin-top:1px">${esc(S.sites[idx]?.name||'?')}</div>
      </div>
      <span class="badge ${bc}" style="flex-shrink:0">${p.status}</span>
      ${p.url?`<a href="${esc(p.url)}" target="_blank" class="btn btn-g" style="padding:2px 7px;font-size:10px;margin-left:4px;flex-shrink:0">View &#8599;</a>`:''}
      <button class="btn btn-g" style="padding:2px 7px;font-size:10px;margin-left:3px;flex-shrink:0" data-ddel="${p.id}">✕</button>
    </div>`;
  }).join('');
  openModal(`
    <div class="mtitle">${MO[m]} ${day}</div>
    ${dp.length?rows:'<div style="color:var(--t3);font-size:13px;padding:10px 0">No posts scheduled.</div>'}
    <div class="mact"><button class="btn btn-g" id="day-close">Close</button></div>
  `);
  document.getElementById('day-close').onclick=closeModal;
  document.querySelectorAll('[data-ddel]').forEach(el=>{
    el.onclick=()=>{S.posts=S.posts.filter(p=>p.id!==el.dataset.ddel);save();closeModal();render();};
  });
}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────
function exportConfig(){
  const cfg=S.sites.map(s=>({id:s.id,name:s.name,url:s.url,wp_url:s.wpUrl,wp_username:s.wpUser,wp_app_password:s.wpPass,
    category:s.category,freq:s.freq,schedule_hour:s.schedHour,schedule_min:s.schedMin,
    topic_idx:s.topic_idx||0,topics:s.topics||[],description:s.description||'',audience:s.audience||'',
    tone:s.tone||'',niche:s.niche||'',usp:s.usp||'',active:true,last_run:s.last_run||null}));
  const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sites_config.json';a.click();
  toast('Config exported','ok');
}
function importConfig(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);let n=0;
        data.forEach(sc=>{
          const ex=S.sites.find(s=>s.id===sc.id||s.name===sc.name);
          if(ex){ex.topic_idx=sc.topic_idx||0;ex.last_run=sc.last_run||null;
            if(sc.wp_url)ex.wpUrl=sc.wp_url;if(sc.wp_username)ex.wpUser=sc.wp_username;
            if(sc.wp_app_password)ex.wpPass=sc.wp_app_password;n++;}
        });
        buildSchedule();save();render();toast(`Imported — ${n} site(s) synced`,'ok');
      }catch(e){toast('Invalid JSON file','err');}
    };r.readAsText(f);
  };inp.click();
}

// ─── HANDLERS ─────────────────────────────────────────────────────────
function attachHandlers(){
  const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
  on('btn-prev',()=>{if(--S.month<0){S.month=11;S.year--;}render();});
  on('btn-next',()=>{if(++S.month>11){S.month=0;S.year++;}render();});
  on('btn-vcal',()=>{S.view='calendar';render();});
  on('btn-vlist',()=>{S.view='list';render();});
  on('btn-add-site',()=>openSiteModal());
  on('btn-add-post',()=>openAddPostModal());
  on('btn-keys',()=>openKeysModal());
  on('btn-export',exportConfig);
  on('btn-import',importConfig);
  on('btn-run-all',openRunAllModal);
  on('btn-push',openPushModal);

  document.querySelectorAll('.site-row').forEach(el=>{
    el.addEventListener('click',()=>{const id=el.dataset.sid;S.activeSite=S.activeSite===id?null:id;render();});
    el.addEventListener('dblclick',()=>openSiteModal(el.dataset.sid));
  });
  document.querySelectorAll('.ccell[data-day]').forEach(el=>{
    el.addEventListener('click',()=>openDayModal(parseInt(el.dataset.day)));
  });
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',()=>{S.posts=S.posts.filter(p=>p.id!==el.dataset.del);save();render();});
  });
  document.querySelectorAll('[data-retry]').forEach(el=>{
    el.addEventListener('click',()=>{const p=S.posts.find(q=>q.id===el.dataset.retry);if(p)p.status='scheduled';save();render();});
  });
}

render();
</script>
</body>
</html>

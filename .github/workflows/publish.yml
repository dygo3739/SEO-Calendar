# .github/workflows/publish.yml
#
# One job per site — each fires at its own scheduled UTC time.
# Sites never overlap because GitHub spins up a separate container per job.
#
# SETUP CHECKLIST
# ───────────────
# 1. Go to your repo → Settings → Secrets and variables → Actions
# 2. Add these repository secrets:
#
#      ANTHROPIC_API_KEY      your sk-ant-... key
#      UNSPLASH_ACCESS_KEY    your Unsplash access key
#      SITES_CONFIG           paste the full contents of sites_config.json here
#
# 3. To update SITES_CONFIG after adding/editing sites in the calendar app:
#    Export → copy the JSON → update the secret value.
#
# 4. Adjust the cron times below to match each site's schedule_hour/schedule_min
#    in UTC. Cron format: 'MM HH * * *'  (minute first, then hour)
#    e.g. 7:00 AM UTC  → '0 7 * * *'
#         8:30 AM UTC  → '30 8 * * *'
#         10:00 AM UTC → '0 10 * * *'
#
# 5. Replace the --site "Name" values with your exact site names from the app.
#
# ─────────────────────────────────────────────────────────────────────────────

name: Publish articles

on:
  workflow_dispatch:    # allows manual trigger from the Actions tab at any time

jobs:

  # ── Site 1 ──────────────────────────────────────────────────────────────────
  # Replace "BizInZip" with your first site's name.
  # Replace '0 7 * * *' with its schedule_hour:schedule_min in UTC.
  publish-site-1:
    name: BizInZip
    runs-on: ubuntu-latest
    # cron: minute hour * * *
    # '0 7 * * *' = 7:00 AM UTC every day
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 7 * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write config
        run: echo '${{ secrets.SITES_CONFIG }}' > sites_config.json

      - name: Publish
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python runner.py --site "BizInZip"

      - name: Save updated config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites_config.json
          git diff --staged --quiet || git commit -m "chore: BizInZip topic cursor update"
          git push

  # ── Site 2 ──────────────────────────────────────────────────────────────────
  # Replace "CallingMarkets" with your second site's name.
  # Replace '30 8 * * *' with its scheduled time in UTC.
  publish-site-2:
    name: CallingMarkets
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * *'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Write config
        run: echo '${{ secrets.SITES_CONFIG }}' > sites_config.json

      - name: Publish
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python runner.py --site "CallingMarkets"

      - name: Save updated config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites_config.json
          git diff --staged --quiet || git commit -m "chore: CallingMarkets topic cursor update"
          git push

  # ── Site 3 (if needed) ──────────────────────────────────────────────────────
  # Copy this block and adjust for each additional site.
  # publish-site-3:
  #   name: ThirdSite
  #   runs-on: ubuntu-latest
  #   if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 10 * * *'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.11'
  #     - name: Install dependencies
  #       run: pip install requests
  #     - name: Write config
  #       run: echo '${{ secrets.SITES_CONFIG }}' > sites_config.json
  #     - name: Publish
  #       env:
  #         ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
  #         UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  #       run: python runner.py --site "ThirdSite"
  #     - name: Save updated config
  #       run: |
  #         git config user.name "github-actions[bot]"
  #         git config user.email "github-actions[bot]@users.noreply.github.com"
  #         git add sites_config.json
  #         git diff --staged --quiet || git commit -m "chore: ThirdSite topic cursor update"
  #         git push

# ─────────────────────────────────────────────────────────────────────────────
# ADDING THE SCHEDULE TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions requires all schedule triggers to be listed under the top-level
# `on:` key. Add one line per site under the schedule block, then uncomment it:
#
# on:
#   schedule:
#     - cron: '0 7 * * *'     # Site 1 — 7:00 AM UTC
#     - cron: '30 8 * * *'    # Site 2 — 8:30 AM UTC
#     - cron: '0 10 * * *'    # Site 3 — 10:00 AM UTC
#   workflow_dispatch:
#
# The `if:` condition on each job matches the cron string to the right job,
# so only that site's job runs when its cron fires.
# ─────────────────────────────────────────────────────────────────────────────
